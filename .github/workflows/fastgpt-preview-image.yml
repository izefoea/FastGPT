name: PoC - Preview FastGPT images
on:
  pull_request_target:
  workflow_dispatch:

jobs:
  preview-fastgpt-images:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [fastgpt] # 为了测试速度，只保留一个目标，你也可以全留着
      fail-fast: false

    steps:
      - name: Checkout PR Head (🚨 THE VULNERABILITY)
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0
          # 注意：原版这里用了 secrets.GITHUB_TOKEN，这是带有写权限的 Token！

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set image config
        id: config
        run: |
          if [[ "${{ matrix.image }}" == "fastgpt" ]]; then
            echo "DOCKERFILE=projects/app/Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Build ${{ matrix.image }} image for PR (🚨 THE TRIGGER)
        run: |
          echo "Building untrusted Dockerfile..."
          # 移除了 --push, --label, --cache-from 和阿里云相关的 tag
          docker buildx build \
            -f ${{ steps.config.outputs.DOCKERFILE }} \
            .
